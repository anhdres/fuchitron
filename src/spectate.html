<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      const params = window.location.search;
      const code = new URLSearchParams(params).get('code');
      window.location.replace('/live/' + (code || ''));
    </script>
  </head>
  <body>
    <p>Redirigiendo...</p>
  </body>
</html>
